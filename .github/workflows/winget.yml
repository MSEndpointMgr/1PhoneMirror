name: Submit to winget

# Once the "Build & Release MSI" workflow finishes successfully on a
# `v*.*.*` tag (which publishes the GitHub Release with the MSI asset),
# automatically open a PR to microsoft/winget-pkgs updating the manifest.
#
# Why `workflow_run` instead of `release: published`?
#   GitHub deliberately suppresses downstream workflow triggers for events
#   fired by the default `GITHUB_TOKEN` (loop prevention). Since release.yml
#   creates the release with `github.token`, a `release: published` trigger
#   here would never fire automatically. `workflow_run` is not subject to
#   that suppression and chains reliably without needing a PAT.
#
# REQUIRED ONE-TIME SETUP:
#   1. Make the FIRST submission manually with `wingetcreate new` so the
#      package identifier (MSEndpointMgr.1PhoneMirror) exists in the index.
#   2. Create a Personal Access Token (classic) with `public_repo` scope.
#      Store it as a repository secret named WINGET_TOKEN.
#   3. (Optional) Fork microsoft/winget-pkgs into your account beforehand;
#      wingetcreate will reuse it.
on:
  workflow_run:
    workflows: ["Build & Release MSI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true

jobs:
  publish:
    runs-on: windows-latest
    # Gate workflow_run trigger: only proceed when the upstream run succeeded
    # AND was triggered by a `v*.*.*` tag push. `head_branch` on a tag-push
    # workflow_run carries the tag name (e.g. "v0.5.0").
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Resolve version + asset URL
        id: ctx
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_run') {
            $tag = '${{ github.event.workflow_run.head_branch }}'
          } else {
            $tag = 'v${{ github.event.inputs.version }}'
          }
          $version = $tag -replace '^v',''
          $url = "https://github.com/MSEndpointMgr/1PhoneMirror/releases/download/$tag/1PhoneMirror-$version.msi"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "url=$url"        >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
          Write-Host "URL:     $url"

          # Wait until the release asset is reachable (the upstream publish
          # step finishes just before this workflow_run event fires; allow
          # for CDN propagation). Up to 3 minutes.
          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
            try {
              Invoke-WebRequest -Uri $url -Method Head -MaximumRedirection 5 -ErrorAction Stop | Out-Null
              Write-Host "Public asset is reachable."
              break
            } catch {
              Write-Host "Waiting for public release asset..."
              Start-Sleep -Seconds 10
            }
          }

      - name: Submit manifest via winget-releaser
        # Pin to the stable @v2 tag rather than @main. The `main` branch
        # has a Windows path-join bug that constructs the upstream
        # existence-check URL with a backslash ("manifests/m\Publisher/..."),
        # which always 404s and aborts the run before any PR is opened.
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: MSEndpointMgr.1PhoneMirror
          version: ${{ steps.ctx.outputs.version }}
          installers-regex: '1PhoneMirror-.*\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
          release-repository: MSEndpointMgr/1PhoneMirror
          release-tag: v${{ steps.ctx.outputs.version }}
