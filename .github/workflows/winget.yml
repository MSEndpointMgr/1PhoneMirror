name: Submit to winget

# Once a GitHub Release is published with the MSI attached, automatically
# open a PR to microsoft/winget-pkgs updating the package manifest.
#
# REQUIRED ONE-TIME SETUP:
#   1. Make the FIRST submission manually with `wingetcreate new` so the
#      package identifier (MSEndpointMgr.1PhoneMirror) exists in the index.
#   2. Create a Personal Access Token (classic) with `public_repo` scope.
#      Store it as a repository secret named WINGET_TOKEN.
#   3. (Optional) Fork microsoft/winget-pkgs into your account beforehand;
#      wingetcreate will reuse it.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Resolve version + asset URL
        id: ctx
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            $tag = '${{ github.event.release.tag_name }}'
          } else {
            $tag = 'v${{ github.event.inputs.version }}'
          }
          $version = $tag -replace '^v',''
          $url = "https://github.com/MSEndpointMgr/1PhoneMirror/releases/download/$tag/1PhoneMirror-$version.msi"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "url=$url"        >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"
          Write-Host "URL:     $url"

          # Wait until the public release is reachable (cross-repo publish step
          # in release.yml races this workflow). Up to 3 minutes.
          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
            try {
              Invoke-WebRequest -Uri $url -Method Head -MaximumRedirection 5 -ErrorAction Stop | Out-Null
              Write-Host "Public asset is reachable."
              break
            } catch {
              Write-Host "Waiting for public release asset..."
              Start-Sleep -Seconds 10
            }
          }

      - name: Submit manifest via winget-releaser
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: MSEndpointMgr.1PhoneMirror
          version: ${{ steps.ctx.outputs.version }}
          installers-regex: '1PhoneMirror-.*\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
          release-repository: MSEndpointMgr/1PhoneMirror
          release-tag: v${{ steps.ctx.outputs.version }}
