name: Build & Release MSI

# Builds the MSI and publishes it as a GitHub Release whenever you push
# a version tag like `v0.2.0`.
#
# Manual trigger is also supported (workflow_dispatch) so you can dry-run
# the build without cutting a release.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v',''
          } else {
            # workflow_dispatch — fall back to CMakeLists.txt project version
            $line = (Select-String -Path CMakeLists.txt -Pattern 'project\([^)]*VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)' | Select-Object -First 1)
            $v = $line.Matches[0].Groups[1].Value
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg/installed
            ~/vcpkg/buildtrees
            ~/vcpkg/packages
            ~/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'scripts/setup_deps.ps1') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install vcpkg + dependencies
        shell: pwsh
        run: |
          # Try preinstalled vcpkg on the runner image first.
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          $usable = $vcpkgRoot -and (Test-Path (Join-Path $vcpkgRoot 'vcpkg.exe'))
          if (-not $usable) {
            $vcpkgRoot = Join-Path $env:USERPROFILE 'vcpkg-1pm'
            $bin = Join-Path $vcpkgRoot 'vcpkg.exe'
            if (-not (Test-Path $bin)) {
              if (Test-Path $vcpkgRoot) {
                Write-Host "Cleaning stale $vcpkgRoot"
                cmd /c "rmdir /s /q `"$vcpkgRoot`""
              }
              git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
              if ($LASTEXITCODE -ne 0) { throw "git clone vcpkg failed" }
              $bootstrap = Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat'
              if (-not (Test-Path $bootstrap)) { throw "bootstrap-vcpkg.bat missing at $bootstrap" }
              & $bootstrap -disableMetrics
              if ($LASTEXITCODE -ne 0) { throw "vcpkg bootstrap failed" }
            }
          }
          Write-Host "Using vcpkg at $vcpkgRoot"
          & (Join-Path $vcpkgRoot 'vcpkg.exe') install `
            "ffmpeg[avcodec,avformat,avfilter,swscale,swresample,gpl,x264]:x64-windows" `
            "sdl2:x64-windows" `
            "openssl:x64-windows" `
            --recurse
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed" }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      - name: Install WiX 5 toolset + extensions
        shell: pwsh
        run: |
          # Ensure nuget.org is a configured source for this runner user
          $sources = dotnet nuget list source 2>&1
          if ($sources -notmatch 'nuget\.org') {
            dotnet nuget add source https://api.nuget.org/v3/index.json -n nuget.org
          }
          dotnet tool install --global wix --version 5.0.2
          # Add the global tools dir to PATH for subsequent steps
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix --version
          wix extension add -g WixToolset.Firewall.wixext/5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension list -g

      - name: Build MSI
        shell: pwsh
        run: |
          .\package.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Upload unsigned MSI artifact (input to SignPath)
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: 1PhoneMirror-${{ steps.ver.outputs.version }}-msi-unsigned
          path: dist/1PhoneMirror-${{ steps.ver.outputs.version }}.msi
          retention-days: 5

      # ----------------------------------------------------------------
      # SignPath.io code signing
      # ----------------------------------------------------------------
      # Requires (configured at the MSEndpointMgr org or 1PhoneMirror repo):
      #   vars.SIGNPATH_ORG_ID            — SignPath organisation GUID
      #   vars.SIGNPATH_PROJECT_SLUG      — usually "1PhoneMirror"
      #   vars.SIGNPATH_POLICY_SLUG       — "release" for tag pushes, "test" for dispatch
      #   secrets.SIGNPATH_API_TOKEN      — SignPath CI user API token
      #
      # If `vars.SIGNPATH_ORG_ID` is empty the steps below are skipped and
      # the unsigned MSI is published — useful while the SignPath project
      # is still being provisioned. Once onboarded, set the variable and
      # all subsequent releases are signed.
      - name: Check SignPath configuration
        id: signpath_cfg
        shell: pwsh
        env:
          SIGNPATH_ORG_ID: ${{ vars.SIGNPATH_ORG_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_ORG_ID)) {
            Write-Warning "SIGNPATH_ORG_ID not set - skipping code signing. MSI will be published unsigned."
            echo "enabled=false" >> $env:GITHUB_OUTPUT
          } else {
            echo "enabled=true" >> $env:GITHUB_OUTPUT
          }

      - name: Submit signing request to SignPath
        if: steps.signpath_cfg.outputs.enabled == 'true'
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
          # Approval is required (configured in the SignPath policy); the
          # action will block until a maintainer approves in the SignPath
          # dashboard, then download the signed MSI.

      - name: Replace unsigned MSI with signed MSI
        if: steps.signpath_cfg.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signed = Get-ChildItem -Path signed -Filter '1PhoneMirror-*.msi' -File | Select-Object -First 1
          if (-not $signed) { throw "SignPath returned no MSI in signed/" }
          $dest = "dist\1PhoneMirror-${{ steps.ver.outputs.version }}.msi"
          Copy-Item $signed.FullName $dest -Force
          Write-Host "Replaced $dest with signed MSI ($($signed.Length) bytes)"
          # Sanity-check the Authenticode signature is present and valid.
          $sig = Get-AuthenticodeSignature $dest
          Write-Host "Signature status: $($sig.Status)"
          Write-Host "Signer subject  : $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { throw "Signed MSI failed Authenticode verification: $($sig.Status)" }

      - name: Compute SHA256 (post-signing)
        id: hash
        shell: pwsh
        run: |
          $msi = "dist\1PhoneMirror-${{ steps.ver.outputs.version }}.msi"
          $h = (Get-FileHash $msi -Algorithm SHA256).Hash
          echo "sha256=$h" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $h"

      - name: Upload signed MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1PhoneMirror-${{ steps.ver.outputs.version }}-msi
          path: dist/1PhoneMirror-${{ steps.ver.outputs.version }}.msi
          retention-days: 30

      - name: Publish Release to public repo (MSEndpointMgr/1PhoneMirror)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          # Prefer a dedicated cross-repo token if one is configured (legacy
          # private-mirror setup); otherwise fall back to the built-in
          # GITHUB_TOKEN, which has `contents: write` on this repo (granted
          # by the `permissions:` block above) and works because this
          # workflow now runs inside MSEndpointMgr/1PhoneMirror itself.
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN || github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
          TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $msi = "dist\1PhoneMirror-$env:VERSION.msi"
          $body = @"
          **SHA256:** ``$env:SHA256``

          Install via winget once the manifest PR is merged:
          ``````
          winget install MSEndpointMgr.1PhoneMirror
          ``````
          "@
          $bodyFile = Join-Path $env:RUNNER_TEMP "release-body.md"
          Set-Content -Path $bodyFile -Value $body -Encoding UTF8

          # Create the tag in the public repo if it doesn't exist (releases need a ref).
          $existingTag = gh api "repos/MSEndpointMgr/1PhoneMirror/git/refs/tags/$env:TAG" 2>$null
          if (-not $existingTag) {
            # Point the public tag at the public repo's default branch HEAD.
            $sha = gh api "repos/MSEndpointMgr/1PhoneMirror/git/refs/heads/main" --jq ".object.sha"
            gh api -X POST "repos/MSEndpointMgr/1PhoneMirror/git/refs" `
              -f "ref=refs/tags/$env:TAG" -f "sha=$sha" | Out-Null
          }

          # Create or replace the release.
          $existingRelease = gh release view $env:TAG --repo MSEndpointMgr/1PhoneMirror 2>$null
          if ($existingRelease) {
            gh release delete $env:TAG --repo MSEndpointMgr/1PhoneMirror --yes
          }
          gh release create $env:TAG $msi `
            --repo MSEndpointMgr/1PhoneMirror `
            --title "1PhoneMirror $env:VERSION" `
            --notes-file $bodyFile
