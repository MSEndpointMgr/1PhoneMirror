name: Build & Release MSI

# Builds the MSI and publishes it as a GitHub Release whenever you push
# a version tag like `v0.2.0`.
#
# Manual trigger is also supported (workflow_dispatch) so you can dry-run
# the build without cutting a release.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v',''
          } else {
            # workflow_dispatch — fall back to CMakeLists.txt project version
            $line = (Select-String -Path CMakeLists.txt -Pattern 'project\([^)]*VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)' | Select-Object -First 1)
            $v = $line.Matches[0].Groups[1].Value
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg/installed
            ~/vcpkg/buildtrees
            ~/vcpkg/packages
            ~/vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'scripts/setup_deps.ps1') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install vcpkg + dependencies
        shell: pwsh
        run: |
          # Prefer the preinstalled vcpkg on the runner image.
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot -or -not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            $vcpkgRoot = "$env:USERPROFILE\vcpkg-1pm"
            if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
              if (Test-Path $vcpkgRoot) { Remove-Item -Recurse -Force $vcpkgRoot }
              git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
              & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
            }
          }
          Write-Host "Using vcpkg at $vcpkgRoot"
          & "$vcpkgRoot\vcpkg.exe" install `
            "ffmpeg[avcodec,avformat,swscale,swresample]:x64-windows" `
            "sdl2:x64-windows" `
            "openssl:x64-windows" `
            --recurse
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed" }
          echo "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      - name: Install WiX 5 toolset + extensions
        shell: pwsh
        run: |
          # Ensure nuget.org is a configured source for this runner user
          $sources = dotnet nuget list source 2>&1
          if ($sources -notmatch 'nuget\.org') {
            dotnet nuget add source https://api.nuget.org/v3/index.json -n nuget.org
          }
          dotnet tool install --global wix --version 5.0.2
          # Add the global tools dir to PATH for subsequent steps
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix --version
          wix extension add -g WixToolset.Firewall.wixext/5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension list -g

      - name: Build MSI
        shell: pwsh
        run: |
          .\package.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Compute SHA256
        id: hash
        shell: pwsh
        run: |
          $msi = "dist\1PhoneMirror-${{ steps.ver.outputs.version }}.msi"
          $h = (Get-FileHash $msi -Algorithm SHA256).Hash
          echo "sha256=$h" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $h"

      - name: Upload MSI artifact (CI runs)
        uses: actions/upload-artifact@v4
        with:
          name: 1PhoneMirror-${{ steps.ver.outputs.version }}-msi
          path: dist/1PhoneMirror-${{ steps.ver.outputs.version }}.msi
          retention-days: 5

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 1PhoneMirror ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/1PhoneMirror-${{ steps.ver.outputs.version }}.msi
          body: |
            **SHA256:** `${{ steps.hash.outputs.sha256 }}`

            Install via winget once the manifest PR is merged:
            ```
            winget install MSEndpointMgr.1PhoneMirror
            ```
